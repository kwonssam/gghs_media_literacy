<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>우리 동네 맛집 지도</title>
  <!-- 카카오맵 API 불러오기 (본인 API 키로 교체하세요) -->
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=8e63724a5ae060891596d0d2cc915fc3"></script>
</head>
<body>
  <h2>우리 동네 맛집 지도</h2>
  <p>지도를 클릭하면 그 위치에 마커가 찍히고 좌표가 표시됩니다.</p>
  
  <div id="map" style="width:600px;height:400px;"></div>
  <div id="coords" style="margin-top:10px; font-weight:bold;"></div>

  <script>
    // 지도 생성
    var container = document.getElementById('map');
    var options = {
      center: new kakao.maps.LatLng(37.5665, 126.9780), // 서울 시청 좌표
      level: 3
    };
    var map = new kakao.maps.Map(container, options);

    // 클릭 시 찍을 마커 준비
    var marker = new kakao.maps.Marker();
    
    // 지도 클릭 이벤트
    kakao.maps.event.addListener(map, 'click', function(mouseEvent) {
      var latlng = mouseEvent.latLng;

      // 클릭한 위치에 마커 표시
      marker.setPosition(latlng);
      marker.setMap(map);

      // 좌표 출력
      var coordsDiv = document.getElementById('coords');
      coordsDiv.innerHTML = '위도: ' + latlng.getLat() + ', 경도: ' + latlng.getLng();
    });
  </script>
</body>
</html>
