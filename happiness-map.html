<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대한민국 행복지도</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --accent: #38bdf8;
  }

  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* 헤더 */
  .header {
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-title { font-size: 18px; font-weight: 900; }
  .header-title span { color: var(--accent); }
  .header-sub { font-size: 12px; color: var(--text2); }

  /* 탭 */
  .tabs { display: flex; gap: 4px; }
  .tab {
    padding: 8px 16px; border-radius: 8px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    background: var(--surface2); color: var(--text2);
    border: 1.5px solid transparent; transition: all .2s;
  }
  .tab.active { background: var(--accent); color: #0f172a; border-color: var(--accent); }
  .tab:not(.active):hover { border-color: var(--border); color: var(--text); }

  /* 본문 */
  .body { display: flex; flex: 1; overflow: hidden; }

  /* 지도 */
  #map { flex: 1; }

  /* 사이드패널 */
  .side {
    width: 300px; background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden; flex-shrink: 0;
  }
  .side-header { padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .side-header h3 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .side-header p { font-size: 12px; color: var(--text2); }

  /* 검색 */
  .search-wrap { padding: 12px 18px; border-bottom: 1px solid var(--border); }
  .search-input {
    width: 100%; padding: 8px 12px; border-radius: 8px;
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--text); font-size: 13px; font-family: inherit;
    outline: none; transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text2); }

  /* 시도 필터 */
  .filter-wrap { padding: 10px 18px; border-bottom: 1px solid var(--border); }
  .filter-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
  .sido-select {
    width: 100%; padding: 7px 10px; border-radius: 8px;
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--text); font-size: 13px; font-family: inherit;
    outline: none; cursor: pointer;
  }

  /* 범례 */
  .legend { padding: 12px 18px; border-bottom: 1px solid var(--border); }
  .legend-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
  .legend-bar { height: 10px; border-radius: 5px; background: linear-gradient(to right, #ef4444, #f97316, #eab308, #22c55e, #06b6d4); margin-bottom: 6px; }
  .legend-ticks { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); }

  /* 목록 */
  .list-wrap { flex: 1; overflow-y: auto; padding: 8px 0; }
  .list-wrap::-webkit-scrollbar { width: 4px; }
  .list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .list-item {
    padding: 10px 18px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    transition: background .15s; border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .list-item:hover { background: var(--surface2); }
  .list-item.active { background: rgba(56, 189, 248, .12); }
  .list-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .list-info { flex: 1; min-width: 0; }
  .list-name { font-size: 13px; font-weight: 700; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-sido { font-size: 11px; color: var(--text2); }
  .list-score { font-size: 13px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

  /* 통계 바 */
  .stats { padding: 12px 18px; border-top: 1px solid var(--border); background: var(--surface); }
  .stats-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stats-val { font-weight: 700; color: var(--text); }

  /* 인포윈도우 커스텀 */
  .custom-info {
    background: #1e293b; border: 1.5px solid #38bdf8;
    border-radius: 10px; padding: 12px 16px; min-width: 160px;
    font-family: 'Noto Sans KR', sans-serif; box-shadow: 0 8px 24px rgba(0,0,0,.4);
  }
  .info-name { font-size: 15px; font-weight: 900; color: #f1f5f9; margin-bottom: 4px; }
  .info-sido { font-size: 11px; color: #94a3b8; margin-bottom: 8px; }
  .info-score-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 3px; }
  .info-score-val { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
  .info-bar-bg { height: 6px; background: #334155; border-radius: 3px; margin-bottom: 8px; }
  .info-bar-fill { height: 6px; border-radius: 3px; }
  .info-rank { font-size: 11px; color: #94a3b8; }

  /* 히트맵 뷰 안내 */
  .heatmap-info {
    position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(15,23,42,.9); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 18px; font-size: 13px; color: var(--text2);
    pointer-events: none; white-space: nowrap; z-index: 10;
  }

  /* 로딩 */
  .loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; z-index: 100;
  }
  .loading-spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text2); }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">지도를 불러오는 중...</div>
</div>

<div class="header">
  <div class="header-left">
    <div>
      <div class="header-title">🗺️ 대한민국 <span>행복지도</span></div>
      <div class="header-sub">2019 삶의만족도 지수 · 전국 228개 구군</div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-marker" onclick="switchView('marker')">📍 마커</div>
    <div class="tab" id="tab-heat" onclick="switchView('heat')">🔥 히트맵</div>
  </div>
</div>

<div class="body">
  <div id="map"></div>

  <div class="side">
    <div class="side-header">
      <h3>구군 목록</h3>
      <p>마커를 클릭하거나 목록에서 선택</p>
    </div>

    <div class="search-wrap">
      <input class="search-input" type="text" id="search" placeholder="구군 이름 검색..." oninput="filterList()">
    </div>

    <div class="filter-wrap">
      <div class="filter-label">시도 필터</div>
      <select class="sido-select" id="sido-filter" onchange="filterList()">
        <option value="">전체</option>
      </select>
    </div>

    <div class="legend">
      <div class="legend-label">삶의만족도 범례</div>
      <div class="legend-bar"></div>
      <div class="legend-ticks">
        <span>낮음 (0)</span>
        <span>0.5</span>
        <span>높음 (1)</span>
      </div>
    </div>

    <div class="list-wrap" id="list"></div>

    <div class="stats" id="stats"></div>
  </div>
</div>

function scoreToColor(score) {
  if (score >= 0.8) return '#06b6d4';       // 최고 — 청록
  if (score >= 0.6) return '#22c55e';       // 높음 — 초록
  if (score >= 0.4) return '#eab308';       // 중간 — 노랑
  if (score >= 0.2) return '#f97316';       // 낮음 — 주황
  return '#ef4444';                          // 최저 — 빨강
}
function scoreToLabel(score) {
  if (score >= 0.8) return '매우 높음';
  if (score >= 0.6) return '높음';
  if (score >= 0.4) return '보통';
  if (score >= 0.2) return '낮음';
  return '매우 낮음';
}

  document.getElementById('loading').style.display = 'none';

  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(36.2, 127.9),
    level: 8
  });

  // 시도 필터 옵션 생성
  const sidos = [...new Set(DATA.map(d => d['시도']))].sort();
  const sel = document.getElementById('sido-filter');
  sidos.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });

  // 마커 생성
  DATA.forEach((d, i) => {
    const color = scoreToColor(d['삶의 만족도']);
    const content = `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.4);cursor:pointer;"></div>`;
    const overlay = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(d['위도'], d['경도']),
      content,
      yAnchor: 0.5, xAnchor: 0.5
    });
    overlay.setMap(map);

    // 클릭 이벤트
    overlay.getContent = () => content;
    const el = document.createElement('div');
    el.innerHTML = content;
    el.firstChild.addEventListener('click', () => selectItem(i));
    const ov2 = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(d['위도'], d['경도']),
      content: el,
      yAnchor: 0.5, xAnchor: 0.5
    });
    overlay.setMap(null);
    ov2.setMap(map);
    markers.push(ov2);
  });

  // 히트맵 데이터
  const heatData = DATA.map(d => ({
    latLng: new kakao.maps.LatLng(d['위도'], d['경도']),
    weight: d['삶의 만족도']
  }));
  heatmap = new kakao.maps.services.Heatmap ? null : null;

  renderList(DATA.map((_, i) => i));
  renderStats(DATA);
});

// ================================================================
// 목록 렌더링
// ================================================================
function renderList(indices) {
  const list = document.getElementById('list');
  list.innerHTML = '';
  const sorted = [...indices].sort((a, b) => DATA[b]['삶의 만족도'] - DATA[a]['삶의 만족도']);
  sorted.forEach((i, rank) => {
    const d = DATA[i];
    const color = scoreToColor(d['삶의 만족도']);
    const item = document.createElement('div');
    item.className = 'list-item' + (i === activeIdx ? ' active' : '');
    item.id = `item-${i}`;
    item.innerHTML = `
      <div class="list-dot" style="background:${color};"></div>
      <div class="list-info">
        <div class="list-name">${d['구군']}</div>
        <div class="list-sido">${d['시도']}</div>
      </div>
      <div class="list-score">${d['삶의 만족도'].toFixed(3)}</div>
    `;
    item.onclick = () => selectItem(i);
    list.appendChild(item);
  });
}

// ================================================================
// 항목 선택
// ================================================================
function selectItem(i) {
  activeIdx = i;
  const d = DATA[i];
  const color = scoreToColor(d['삶의 만족도']);
  const sorted = [...DATA].sort((a, b) => b['삶의 만족도'] - a['삶의 만족도']);
  const rank = sorted.findIndex(x => x['구군'] === d['구군'] && x['시도'] === d['시도']) + 1;

  // 기존 인포 닫기
  if (infoWindow) infoWindow.setMap(null);

  const infoContent = `
    <div class="custom-info">
      <div class="info-name">${d['구군']}</div>
      <div class="info-sido">${d['시도']}</div>
      <div class="info-score-label">삶의만족도 지수</div>
      <div class="info-score-val" style="color:${color}">${d['삶의 만족도'].toFixed(4)}</div>
      <div class="info-bar-bg">
        <div class="info-bar-fill" style="width:${d['삶의 만족도']*100}%;background:${color};"></div>
      </div>
      <div class="info-rank">전국 ${rank}위 · ${scoreToLabel(d['삶의 만족도'])}</div>
    </div>
  `;
  infoWindow = new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(d['위도'], d['경도']),
    content: infoContent,
    yAnchor: 1.3, xAnchor: 0.5,
    zIndex: 10
  });
  infoWindow.setMap(map);
  map.setCenter(new kakao.maps.LatLng(d['위도'], d['경도']));

  // 목록 스크롤
  document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`item-${i}`);
  if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest' }); }
}

// ================================================================
// 필터/검색
// ================================================================
function filterList() {
  const keyword = document.getElementById('search').value.trim();
  const sido = document.getElementById('sido-filter').value;
  const indices = DATA.reduce((acc, d, i) => {
    const matchSido = !sido || d['시도'] === sido;
    const matchKw = !keyword || d['구군'].includes(keyword) || d['시도'].includes(keyword);
    if (matchSido && matchKw) acc.push(i);
    return acc;
  }, []);
  renderList(indices);
  renderStats(indices.map(i => DATA[i]));
}

// ================================================================
// 통계
// ================================================================
function renderStats(data) {
  const vals = data.map(d => d['삶의 만족도']).filter(v => v != null);
  if (!vals.length) return;
  const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
  const max = Math.max(...vals);
  const min = Math.min(...vals);
  const maxItem = data.find(d => d['삶의 만족도'] === max);
  const minItem = data.find(d => d['삶의 만족도'] === min);
  document.getElementById('stats').innerHTML = `
    <div class="stats-row"><span>표시 구군</span><span class="stats-val">${vals.length}개</span></div>
    <div class="stats-row"><span>평균</span><span class="stats-val">${avg.toFixed(3)}</span></div>
    <div class="stats-row"><span>최고</span><span class="stats-val" style="color:#06b6d4">${maxItem['구군']} ${max.toFixed(3)}</span></div>
    <div class="stats-row"><span>최저</span><span class="stats-val" style="color:#ef4444">${minItem['구군']} ${min.toFixed(3)}</span></div>
  `;
}

// ================================================================
// 뷰 전환
// ================================================================
function switchView(view) {
  currentView = view;
  document.getElementById('tab-marker').classList.toggle('active', view === 'marker');
  document.getElementById('tab-heat').classList.toggle('active', view === 'heat');

  if (view === 'heat') {
    // 마커 숨기기
    markers.forEach(m => m.setMap(null));
    if (infoWindow) infoWindow.setMap(null);

    // 기존 원 제거
    circleOverlays.forEach(c => c.setMap(null));
    circleOverlays = [];

    // 점수에 따라 색깔 원으로 표시
    DATA.forEach(d => {
      const score = d['삶의 만족도'];
      // 점수 → RGBA 색상
      let r, g, b;
      if (score >= 0.8)      { r=6;   g=182; b=212; }  // 청록
      else if (score >= 0.6) { r=34;  g=197; b=94;  }  // 초록
      else if (score >= 0.4) { r=234; g=179; b=8;   }  // 노랑
      else if (score >= 0.2) { r=249; g=115; b=22;  }  // 주황
      else                   { r=239; g=68;  b=68;  }  // 빨강

      const circle = new kakao.maps.Circle({
        center: new kakao.maps.LatLng(d['위도'], d['경도']),
        radius: 8000 + score * 12000,   // 점수 높을수록 큰 원
        strokeWeight: 1,
        strokeColor: `rgb(${r},${g},${b})`,
        strokeOpacity: 0.6,
        fillColor: `rgb(${r},${g},${b})`,
        fillOpacity: 0.35
      });
      circle.setMap(map);
      circleOverlays.push(circle);
    });

  } else {
    // 원 제거, 마커 다시 표시
    circleOverlays.forEach(c => c.setMap(null));
    circleOverlays = [];
    markers.forEach(m => m.setMap(map));
  }
}
</script>
